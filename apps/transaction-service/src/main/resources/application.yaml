spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spendwise
    username: spendwise
    password: spendwise
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    repair-on-migrate : true
    enabled: true
    locations: classpath:db/migration
  application:
    name: transaction-service

#  profiles:
#    active: ${SPRING_PROFILES_ACTIVE:local}
  # Progress with DB later, so turning off the JPA autoconfiguration for now.
  autoconfigure:
    exclude:
#        - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
#        - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration$Hikari
#        - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
#        - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
#        - org.springframework.boot.devtools.autoconfigure.DevToolsDataSourceAutoConfiguration

server:
  port: 8085
  shutdown: graceful
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  info:
    git:
      mode: full
    env:
      enabled:true

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"

logging:
  level:
    root: INFO
    com.spendwise: DEBUG
