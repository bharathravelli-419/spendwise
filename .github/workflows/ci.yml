# This is a basic workflow to help you get started with Actions

name: CI for spendwise

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
  workflow_dispatch:
    
concurrency: 
  group: ci-${{ github.ref }}
  cancel-in-progress: true
  # Allows you to run this workflow manually from the Actions tab
  

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  backend:
    name: backend - transation - service
    strategy:
      fail-fast: false
      matrix:
        service: [transaction-service]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/transaction-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant Gradle Exec
        run: chmod +x ./gradlew
      
      - name: Build and Test
        run: ./gradlew build
      
      - name: Build, Test, Lint
        working-directory: apps/${{ matrix.service }}
        run: ./gradlew --no-daemon clean check build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service}}
          path: apps/${{ matrix.service }}/build/reports/tests
    
  frontend:
    name: frontend - web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          # FIX: Directs GitHub to look inside the subfolder for the dependency layout
          cache-dependency-path: 'apps/web/package-lock.json'
      - working-directory: apps/web
        run: |
          npm ci
          npm run build


  check-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check required Docs are present
        run: |
          test -f README.md
          test -f .gitignore
          test -f .editorconfig
          test -d docs/adr
          echo "Required files are present"
