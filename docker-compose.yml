services:
  jenkins:
    image: jenkins/jenkins:lts
    user: root
    ports: 
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    # FIX: Allows Testcontainers to talk to your host machine's Docker daemon
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - postgres

  transaction-service:
    build: ./apps/transaction-service
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/spendwise
      SPRING_DATASOURCE_USERNAME: spendwise
      SPRING_DATASOURCE_PASSWORD: spendwise
    ports: ["8085:8085"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: spendwise
      POSTGRES_PASSWORD: spendwise
      POSTGRES_DB: spendwise
    ports:
      - "5432:5432"
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise"]
      interval: 5s
      timeout: 3s
      retries: 5
  adminer:
    image: adminer
    ports:
      - "8082:8080"
  redis:
    image: redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
  jenkins_home: